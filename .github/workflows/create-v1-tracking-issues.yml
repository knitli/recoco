            const trackingBody = `## Overview

This is the tracking issue for reaching parity with the upstream \`cocoindex-io/cocoindex\`
\`v1\` branch. It covers Rust-relevant changes identified in the bootstrap scan (#27),
organized into four phases by priority and complexity.

**Upstream repository:** https://github.com/cocoindex-io/cocoindex  
**Upstream branch:** \`v1\`  
**Upstream latest release at time of creation:** v1.0.0-alpha.24  
**Bootstrap scan issue:** #27

---

## Branch Plan for Reaching Parity

The plan follows a phased approach, moving from easy/critical fixes to complex
architectural changes. Each phase builds on the previous one.

### Phase 1 — Quick Wins (Easy, ~1–2 days each)

These are straightforward adoptions: one bug fix and two configurability improvements.
No major design decisions required. Start here.

| Issue | Upstream | Type | Effort |
|-------|----------|------|--------|
| #${issue1.number} | PR #1715 | Bug fix | Easy |
| #${issue2.number} | PR #1714 | Validation | Easy |
| #${issue3.number} | PR #1704 | Configurability | Easy |

### Phase 2 — Infrastructure (~3–5 days each)

Structural improvements that may affect how other phases are implemented.
The ops-text refactor (#1655) should be verified before Phase 3 work begins.

| Issue | Upstream | Type | Effort |
|-------|----------|------|--------|
| #${issue4.number} | PR #1655 | Refactor/verify | Medium |
| #${issue5.number} | PR #1459 | Architecture | Medium |

### Phase 3 — New Features (~3–7 days each)

User-facing features. These are independent of Phase 4 and can be done in parallel.

| Issue | Upstream | Type | Effort |
|-------|----------|------|--------|
| #${issue6.number} | PR #1669 | New feature | Medium |
| #${issue7.number} | PR #1487 | New target | Medium |

### Phase 4 — Core Engine Overhaul (~1–3 weeks total)

Significant changes to the memoization and execution engine. These are interdependent:
implement #${issue8.number} first, then #${issue9.number}, #${issue10.number}, and #${issue11.number} can be done in parallel.

| Issue | Upstream | Type | Effort | Dependencies |
|-------|----------|------|--------|--------------|
| #${issue8.number} | PRs #1684/#1686 | Architecture | Hard | — |
| #${issue9.number} | PR #1732 | Feature | Medium | #${issue8.number} |
| #${issue10.number} | PR #1716 | Architecture | Hard | — |
| #${issue11.number} | PR #1730 | Feature | Medium | #${issue8.number} |

### Maintenance

| Issue | Upstream | Type | Effort |
|-------|----------|------|--------|
| #${issue12.number} | PRs #1710/#1711 | Dependency review | Easy |

