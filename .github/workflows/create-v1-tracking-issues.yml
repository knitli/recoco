## Problem

After implementing logic change detection (#1684/#1686), all functions are tracked
uniformly. This PR adds granular control over the scope of tracking.

## Upstream Change

**Type:** New feature  
**Difficulty:** Medium  
**Upstream files changed:**
- \`rust/core/src/engine/context.rs\`
- \`rust/core/src/engine/function.rs\`
- \`rust/core/src/engine/logic_registry.rs\`

## Recoco Mapping

- \`crates/recoco-core/src/execution/\` (core engine files)

## Implementation Notes

Add a \`logic_tracking\` option to control granularity of logic change tracking:
- **Per-function tracking** (default): Each function is tracked independently.
- **Broader scope**: Track a group of functions together.
- **Disabled**: Opt out of tracking for specific functions.

This is an extension of the work done in the logic change detection sub-issue.

## Dependencies

- Requires completion of #1684/#1686 implementation first.

## References

- Upstream PR: https://github.com/cocoindex-io/cocoindex/pull/1732
- Bootstrap tracking issue: #27
`,
              ['upstream-sync', 'upstream-v1-parity', 'enhancement', 'difficulty:medium', 'phase:4']
