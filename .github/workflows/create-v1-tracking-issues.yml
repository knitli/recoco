              `## Summary

Adapt upstream architectural change from [cocoindex-io/cocoindex#1716](https://github.com/cocoindex-io/cocoindex/pull/1716).

## Problem

Functions can only return a single output value. State functions can maintain and
return persistent state alongside their normal output, enabling richer memoization
patterns (e.g., tracking file modification times alongside content).

## Upstream Change

**Type:** Architectural change (significant)  
**Difficulty:** Hard  
**Upstream files changed:**
- \`rust/core/src/engine/component.rs\`
- \`rust/core/src/engine/context.rs\`
- \`rust/core/src/engine/execution.rs\`
- \`rust/core/src/engine/function.rs\`
- \`rust/core/src/state/db_schema.rs\`

## Recoco Mapping

- \`crates/recoco-core/src/execution/memoization.rs\`
- \`crates/recoco-core/src/execution/\` (multiple files)

## Implementation Notes

The "state functions" concept adds a parallel state output channel to functions:
1. A function can implement a \`state_output()\` method returning serializable state.
2. The state is stored alongside the memoized result.
3. On re-runs, the previous state is provided to the function as input.
4. The state can be used for change detection (e.g., file mtime + size).

This is a significant API addition. The recoco SDK (\`ops/sdk.rs\`) will need
new traits or associated types.

## References

- Upstream PR: https://github.com/cocoindex-io/cocoindex/pull/1716
- Bootstrap tracking issue: #27
