Adapt upstream feature from [cocoindex-io/cocoindex#1730](https://github.com/cocoindex-io/cocoindex/pull/1730).

## Problem

Context keys (e.g., embedder configurations, API keys) are not tracked as
dependencies. When a context value changes, affected computations are not
automatically reprocessed.

## Upstream Change

**Type:** New feature  
**Difficulty:** Medium  
**Upstream files changed:**
- \`rust/core/src/engine/environment.rs\`
- \`rust/core/src/engine/execution.rs\`
- \`rust/core/src/engine/logic_registry.rs\`

## Recoco Mapping

- \`crates/recoco-core/src/execution/\` (core engine files)

## Implementation Notes

Allows context keys to be registered as tracked dependencies:
1. When a function declares it depends on a context key, that key's value is
   included in the function's dependency fingerprint.
2. If the context value changes between runs, the function is reprocessed.
3. This enables automatic reprocessing when, e.g., an embedder model changes.

## Dependencies

- Related to logic change detection (#1684/#1686).
- Works alongside state functions (#1716).

## References

- Upstream PR: https://github.com/cocoindex-io/cocoindex/pull/1730
- Bootstrap tracking issue: #27
