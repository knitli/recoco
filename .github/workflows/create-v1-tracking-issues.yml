name: 📋 Create V1 Upstream Parity Tracking Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print what would be created, don't create)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  create-tracking-issues:
    name: Create V1 Parity Tracking Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Create V1 Parity Tracking Issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # ratchet:actions/github-script@v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const dryRun = '${{ inputs.dry_run }}' === 'true';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function createIssue(title, body, labels) {
              if (dryRun) {
                core.info(`[DRY RUN] Would create issue: ${title}`);
                return { number: 0, html_url: 'https://github.com/dry-run' };
              }
              const { data } = await github.rest.issues.create({
                owner, repo, title, body, labels
              });
              core.info(`Created issue #${data.number}: ${title}`);
              return data;
            }

            async function createComment(issueNumber, body) {
              if (dryRun) {
                core.info(`[DRY RUN] Would comment on #${issueNumber}`);
                return;
              }
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber, body
              });
              core.info(`Commented on issue #${issueNumber}`);
            }

            // Ensure required labels exist
            const labelsToEnsure = [
              { name: 'upstream-sync', color: '0075ca', description: 'Tracks changes from the upstream cocoindex-io/cocoindex repository' },
              { name: 'upstream-v1-parity', color: 'e4e669', description: 'Tasks for reaching parity with upstream cocoindex v1 branch' },
              { name: 'bug', color: 'd73a4a', description: "Something isn't working" },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'refactor', color: 'fbca04', description: 'Code refactoring or restructuring' },
              { name: 'difficulty:easy', color: 'c2e0c6', description: 'Estimated easy implementation effort' },
              { name: 'difficulty:medium', color: 'f9d0c4', description: 'Estimated medium implementation effort' },
              { name: 'difficulty:hard', color: 'e11d48', description: 'Estimated hard implementation effort' },
              { name: 'phase:1', color: 'bfd4f2', description: 'Phase 1: Quick wins (bug fixes and easy adoptions)' },
              { name: 'phase:2', color: 'bfd4f2', description: 'Phase 2: Infrastructure improvements' },
              { name: 'phase:3', color: 'bfd4f2', description: 'Phase 3: New features' },
              { name: 'phase:4', color: 'bfd4f2', description: 'Phase 4: Core engine overhaul' },
            ];

            for (const label of labelsToEnsure) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (e) {
                if (e.status === 404) {
                  if (!dryRun) {
                    await github.rest.issues.createLabel({ owner, repo, ...label });
                    core.info(`Created label: ${label.name}`);
                  } else {
                    core.info(`[DRY RUN] Would create label: ${label.name}`);
                  }
                }
              }
            }

            // ─── Sub-Issues ───────────────────────────────────────────────────────────

            // Phase 1 — Quick Wins

            const issue1 = await createIssue(
              '[upstream-v1-parity] Phase 1: Adopt PR #1715 — Fix execution plan initialization race condition',
              `## Summary

Adopt upstream fix from [cocoindex-io/cocoindex#1715](https://github.com/cocoindex-io/cocoindex/pull/1715).

## Problem

A race condition exists where the execution plan is initialized before target setup
has completed, causing correctness issues in persisted flow setups.

## Upstream Change

**Type:** Bug fix  
**Difficulty:** Easy  
**Upstream files changed:**
- \`rust/cocoindex/src/builder/exec_ctx.rs\`
- \`rust/cocoindex/src/execution/db_tracking_setup.rs\`
- \`rust/cocoindex/src/lib_context.rs\`
- \`rust/cocoindex/src/setup/driver.rs\`

## Recoco Mapping

- \`crates/recoco-core/src/builder/\`
- \`crates/recoco-core/src/execution/\`
- \`crates/recoco-core/src/lib_context.rs\`

## Implementation Notes

Review the upstream diff for PR #1715 and apply the equivalent ordering fix to
recoco's builder and execution initialization chain. This is a pure Rust fix with
no dependency changes required.

## References

- Upstream PR: https://github.com/cocoindex-io/cocoindex/pull/1715
- Bootstrap tracking issue: #27
`,
              ['upstream-sync', 'upstream-v1-parity', 'bug', 'difficulty:easy', 'phase:1']
            );

            const issue2 = await createIssue(
              '[upstream-v1-parity] Phase 1: Adopt PR #1714 — Tighten table/column name validation for targets',
              `## Summary

Adopt upstream improvement from [cocoindex-io/cocoindex#1714](https://github.com/cocoindex-io/cocoindex/pull/1714).

## Problem

Invalid table and column names produce opaque database errors. Early validation
with clear error messages makes debugging easier.

## Upstream Change

**Type:** Validation improvement  
**Difficulty:** Easy  
**Upstream files changed:**
