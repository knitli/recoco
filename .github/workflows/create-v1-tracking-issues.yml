            const subIssueLinks = [
              `- [ ] **Phase 1 (Easy):** #${issue1.number} — Fix execution plan initialization race condition (adopts upstream PR #1715)`,
              `- [ ] **Phase 1 (Easy):** #${issue2.number} — Tighten table/column name validation for targets (adopts upstream PR #1714)`,
