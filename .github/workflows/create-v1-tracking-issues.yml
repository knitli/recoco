   when changes are detected.
4. Add appropriate error handling for platforms where \`notify\` has limited support.

## References

- Upstream PR: https://github.com/cocoindex-io/cocoindex/pull/1669
- Bootstrap tracking issue: #27
`,
              ['upstream-sync', 'upstream-v1-parity', 'enhancement', 'difficulty:medium', 'phase:3']
