4. Update \`crates/recoco-core\` to use \`recoco-splitters\` in the same way upstream
   uses \`ops_text\`.

## References

- Upstream PR: https://github.com/cocoindex-io/cocoindex/pull/1655
- Bootstrap tracking issue: #27
`,
              ['upstream-sync', 'upstream-v1-parity', 'refactor', 'difficulty:medium', 'phase:2']
            );

            const issue5 = await createIssue(
              '[upstream-v1-parity] Phase 2: Adopt PR #1459 — Dedicated DB schema for internal tracking tables',
              `## Summary

