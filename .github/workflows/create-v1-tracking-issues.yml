## References

- Upstream PR: https://github.com/cocoindex-io/cocoindex/pull/1487
- Bootstrap tracking issue: #27
`,
              ['upstream-sync', 'upstream-v1-parity', 'enhancement', 'difficulty:medium', 'phase:3']
            );

            // Phase 4 — Core Engine Overhaul

            const issue8 = await createIssue(
              '[upstream-v1-parity] Phase 4: Adapt PRs #1684/#1686 — Logic change detection and memo cache invalidation',
              `## Summary

Adapt upstream architectural changes from:
- [cocoindex-io/cocoindex#1684](https://github.com/cocoindex-io/cocoindex/pull/1684)
- [cocoindex-io/cocoindex#1686](https://github.com/cocoindex-io/cocoindex/pull/1686)

## Problem

When business logic changes (e.g., a function's implementation is updated), the
memo cache is not automatically invalidated. Users must manually clear the cache
or risk stale results.

## Upstream Change

**Type:** Architectural change (significant memoization overhaul)  
**Difficulty:** Hard  
**Upstream files changed:**
- \`rust/core/src/engine/component.rs\`
- \`rust/core/src/engine/context.rs\`
- \`rust/core/src/engine/execution.rs\`
- \`rust/core/src/engine/function.rs\`
- \`rust/core/src/engine/logic_registry.rs\`
- \`rust/core/src/engine/mod.rs\`
- \`rust/core/src/state/db_schema.rs\`

## Recoco Mapping

- \`crates/recoco-core/src/execution/memoization.rs\`
- \`crates/recoco-core/src/execution/\` (multiple files)

## Implementation Notes

This is a significant addition to the memoization system. The key concepts:
1. **Function fingerprinting**: Compute a hash/fingerprint of a function's logic
   (e.g., using the function's source code hash or an explicit version).
2. **Fingerprint storage**: Store the fingerprint alongside cached results.
3. **Cache invalidation**: On each run, compare the current fingerprint with the
   stored one. If different, invalidate the cached result.
4. **Explicit versioning**: Support a \`#[coco_version("1.0")]\` attribute or similar
   for stable fingerprints that don't change on cosmetic code changes.

This must be implemented before or alongside #1732 (logic_tracking option).

## Related Issues

- Depends on nothing, but #1732 extends this functionality.
- #1716 (state functions) and #1730 (context tracking) are related.

## References

- Upstream PR #1684: https://github.com/cocoindex-io/cocoindex/pull/1684
- Upstream PR #1686: https://github.com/cocoindex-io/cocoindex/pull/1686
- Bootstrap tracking issue: #27
