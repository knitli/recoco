name: 🔄 Upstream Sync Monitor

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 AM UTC
  workflow_dispatch:

concurrency:
  group: upstream-sync-monitor
  cancel-in-progress: true

jobs:
  monitor:
    name: Check Upstream for Relevant Changes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Setup Mise Environment
        uses: ./.github/actions/setup-mise-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          profile: minimal
          skip-checkout: "true"
          upstream-agent: "true"
        id: setup-mise
      - name: Ensure 'claude' label exists
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # ratchet:actions/github-script@v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'claude',
              });
              core.info("'claude' label already exists.");
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'claude',
                  color: 'CC785C',
                  description: 'Created or actioned by Claude AI',
                });
                core.info("Created 'claude' label.");
              } else {
                throw e;
              }
            }

      - name: Ensure 'upstream-sync' label exists
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # ratchet:actions/github-script@v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'upstream-sync',
              });
              core.info("'upstream-sync' label already exists.");
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'upstream-sync',
                  color: '0075ca',
                  description: 'Tracks changes from the upstream cocoindex-io/cocoindex repository',
                });
                core.info("Created 'upstream-sync' label.");
              } else {
                throw e;
              }
            }
      - name: Determine SINCE_DATE and BOOTSTRAPPING status
        id: since-date
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            try {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: 'knitli',
                repo: 'recoco',
                labels: 'upstream-sync',
                state: 'all',
                per_page: 1,
                sort: 'created',
                direction: 'desc',
              });

              let sinceDate, bootstrapping;
              if (issues.length === 0) {
                sinceDate = '2026-01-25T00:00:00Z';
                bootstrapping = 'true';
              } else {
                sinceDate = new Date(Date.now() - 14 * 24 * 60 * 60 * 1000).toISOString();
                bootstrapping = 'false';
              }

              core.setOutput('SINCE_DATE', sinceDate);
              core.setOutput('BOOTSTRAPPING', bootstrapping);
              core.info(`SINCE_DATE=${sinceDate} (bootstrapping=${bootstrapping})`);
            }.catch (error) {
              core.setFailed(`Error determining SINCE_DATE: ${error.message}`);
            }

      - name: Echo SINCE_DATE and BOOTSTRAPPING
        run: |
          echo "SINCE_DATE: ${{ steps.since-date.outputs.SINCE_DATE }}"
          echo "BOOTSTRAPPING: ${{ steps.since-date.outputs.BOOTSTRAPPING }}"

      - name: Gather Upstream Data
        id: gather-data
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          SINCE_DATE: ${{ steps.since-date.outputs.SINCE_DATE }}
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            try {
              // Get upstream releases
              const releasesResponse = await github.rest.repos.listReleases({
                owner: 'cocoindex-io',
                repo: 'cocoindex',
                per_page: 20,
              });
              let releases = releasesResponse.data.filter(release => new Date(release.published_at) >= new Date(process.env.SINCE_DATE)).map(release => ({
                tagName: release.tag_name,
                publishedAt: release.published_at,
                name: release.name,
                body: release.body ? release.body.substring(0, 1500) : '',
              }));
              core.info(`Releases: ${releases.length}`);
            }.catch (error) {
              core.warning(`Error fetching releases: ${error.message}`);
              releases = [];
            });
              try {
                // Get upstream commits
                const commitsResponse = await github.rest.repos.listCommits({
                  owner: 'cocoindex-io',
                  repo: 'cocoindex',
                  since: process.env.SINCE_DATE,
                  per_page: 100,
                });
                let commits = commitsResponse.data.map(commit => ({
                  sha: commit.sha ? commit.sha.substring(0, 8) : '',
                  message: commit.commit.message ? commit.commit.message.split('\n')[0] : '',
                  date: commit.commit.author.date,
                  url: commit.html_url || '',
                }));
                core.info(`Commits: ${commits.length}`);
              }.catch (error) {
                core.warning(`Error fetching commits: ${error.message}`);
                commits = [];
              });

              try {
                // Get upstream version branches
                const branchesResponse = await github.rest.repos.listBranches({
                  owner: 'cocoindex-io',
                  repo: 'cocoindex',
                  per_page: 100,
                });
                let versionBranches = branchesResponse.data.filter(branch => /^v[1-9]/.test(branch.name)).map(branch => branch.name);
                core.info(`Version branches: ${versionBranches.join(', ')}`);
              }.catch (error) {
                core.warning(`Error fetching branches: ${error.message}`);
                versionBranches = [];
              });

              try {
                // Get merged PRs
                const prsResponse = await github.rest.pulls.list({
                  owner: 'cocoindex-io',
                  repo: 'cocoindex',
                  state: 'closed',
                  sort: 'updated',
                  direction: 'desc',
                  per_page: 50,
                });
                let mergedPRs = prsResponse.data.filter(pr => pr.merged_at && new Date(pr.merged_at) >= new Date(process.env.SINCE_DATE)).map(pr => ({
                  number: pr.number,
                  title: pr.title,
                  mergedAt: pr.merged_at,
                  url: pr.html_url,
                  body: pr.body ? pr.body.substring(0, 1500) : '',
                }));
                core.info(`Merged PRs: ${mergedPRs.length}`);
              }.catch (error) {
                core.warning(`Error fetching PRs: ${error.message}`);
                mergedPRs = [];
              });

              try {
                // Get existing tracking issues
                const issuesResponse = await github.rest.issues.listForRepo({
                  owner: 'knitli',
                  repo: 'recoco',
                  labels: 'upstream-sync',
                  state: 'all',
                  per_page: 200,
                });
                let existingIssues = issuesResponse.data.map(issue => ({
                  number: issue.number,
                  title: issue.title,
                }));
                core.info(`Existing issues: ${existingIssues.length}`);
              }.catch (error) {
                core.warning(`Error fetching existing issues: ${error.message}`);
                existingIssues = [];
              });
              // Save data to files for next steps
              const fs = require('fs');
              fs.writeFileSync('/tmp/upstream_releases.json', JSON.stringify(releases));
              fs.writeFileSync('/tmp/upstream_commits.json', JSON.stringify(commits));
              fs.writeFileSync('/tmp/upstream_branches.json', JSON.stringify(versionBranches));
              fs.writeFileSync('/tmp/upstream_prs.json', JSON.stringify(mergedPRs));
              fs.writeFileSync('/tmp/existing_issues.json', JSON.stringify(existingIssues));

      - name: Build Claude Prompt
        env:
          REPO: ${{ github.repository }}
          SINCE_DATE: ${{ steps.since-date.outputs.SINCE_DATE }}
          BOOTSTRAPPING: ${{ steps.since-date.outputs.BOOTSTRAPPING }}
        run: |
          {
            echo 'PROMPT<<UPSTREAM_PROMPT_DELIMITER'
            printf 'REPO: %s\n' "$REPO"
            printf 'SINCE_DATE: %s\n' "$SINCE_DATE"
            printf 'BOOTSTRAPPING: %s\n' "$BOOTSTRAPPING"
            echo ''
            echo '## PRE-FETCHED DATA'
            echo ''
            echo '### Upstream Releases (filtered to >= SINCE_DATE)'
            echo '```json'
            cat /tmp/upstream_releases.json
            echo '```'
            echo ''
            echo '### Upstream Commits (since SINCE_DATE)'
            echo '```json'
            cat /tmp/upstream_commits.json
            echo '```'
            echo ''
            echo '### Version Branches (^v[1-9] only)'
            echo '```json'
            cat /tmp/upstream_branches.json
            echo '```'
            echo ''
            echo '### Merged PRs (merged >= SINCE_DATE)'
            echo '```json'
            cat /tmp/upstream_prs.json
            echo '```'
            echo ''
            echo '### Existing Upstream-Sync Issues in knitli/recoco'
            echo '```json'
            cat /tmp/existing_issues.json
            echo '```'
            echo ''
            echo '---'
            echo ''
            cat "$GITHUB_WORKSPACE/.github/_upstream_agent_prompt.md"
            echo 'UPSTREAM_PROMPT_DELIMITER'
          } >> "$GITHUB_ENV"

      - name: Run Claude Upstream Sync Analysis
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --max-turns 50
            --allowedTools 'Bash,WebFetch'
          prompt: ${{ env.PROMPT }}

      - name: Log Session Output
        run: |
          output_file="/home/runner/work/_temp/claude-execution-output.json"
          if [ -f "$output_file" ]; then
            cat "$output_file"
          else
            echo "No session output file found (Claude Code may have failed to start)"
          fi
