name: 🔄 Upstream Sync Monitor

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 AM UTC
  workflow_dispatch:

concurrency:
  group: upstream-sync-monitor
  cancel-in-progress: true

jobs:
  monitor:
    name: Check Upstream for Relevant Changes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Setup Mise Environment
        uses: ./.github/actions/setup-mise-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          profile: minimal
          skip-checkout: "true"
          upstream-agent: "true"
          upstream-pat: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        id: setup-mise
      - name: Ensure 'claude' label exists
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # ratchet:actions/github-script@v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'claude',
              });
              core.info("'claude' label already exists.");
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'claude',
                  color: 'CC785C',
                  description: 'Created or actioned by Claude AI',
                });
                core.info("Created 'claude' label.");
              } else {
                throw e;
              }
            }

      - name: Ensure 'upstream-sync' label exists
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # ratchet:actions/github-script@v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'upstream-sync',
              });
              core.info("'upstream-sync' label already exists.");
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'upstream-sync',
                  color: '0075ca',
                  description: 'Tracks changes from the upstream cocoindex-io/cocoindex repository',
                });
                core.info("Created 'upstream-sync' label.");
              } else {
                throw e;
              }
            }
      - name: Create MCP Config
        env:
          GHTOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          cat > /tmp/mcp_config.json << EOF
          {
            "mcpServers": {
              "github": {
                "type": "http",
                "url": "https://api.githubcopilot.com/mcp/",
                "headers": {
                  "X-MCP-Toolsets": "actions,copilot,dependabot,discussions,git,issues,labels,repos",
                  "X-MCP-Insiders": "true",
                  "Authorization": "Bearer ${GHTOKEN}"
                }
              }
            }
          }
          EOF
      - name: Setup Environment
        id: env-setup
        run: |
          {
            echo 'PROMPT<<UPSTREAM_PROMPT_DELIMITER'
            printf 'REPO: %s\n\n' '${{ github.repository }}'
            cat "$GITHUB_WORKSPACE/.github/_upstream_agent_prompt.md"
            printf '\n'
            echo 'UPSTREAM_PROMPT_DELIMITER'
          } >> "$GITHUB_ENV"
      - name: Run Claude Upstream Sync Analysis
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --mcp-config '/tmp/mcp_config.json'
            --max-turns 120
            --allowedTools 'Bash,TaskOutput,Edit,ExitPlanMode,Glob,Grep,LS,KillShell,MCPSearch,MultiEdit,Read,Skill,Agent,TaskCreate,TaskGet,TaskList,TaskUpdate,WebFetch,WebSearch,Write,mcp__github*'
            --show-full-output
          prompt: ${{ env.PROMPT }}

      - name: Log Session Output
        run: |
          output="$(cat '/home/runner/work/_temp/claude-execution-output.json')"
          echo "SESSION_OUTPUT=$output" >> "$GITHUB_ENV"
          echo "$output"
