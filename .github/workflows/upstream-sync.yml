name: 🔄 Upstream Sync Monitor

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 AM UTC
  workflow_dispatch:

concurrency:
  group: upstream-sync-monitor
  cancel-in-progress: true

jobs:
  monitor:
    name: Check Upstream for Relevant Changes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Setup Mise Environment
        uses: ./.github/actions/setup-mise-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          profile: minimal
          skip-checkout: "true"
          upstream-agent: "true"
        id: setup-mise
      - name: Ensure 'claude' label exists
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # ratchet:actions/github-script@v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'claude',
              });
              core.info("'claude' label already exists.");
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'claude',
                  color: 'CC785C',
                  description: 'Created or actioned by Claude AI',
                });
                core.info("Created 'claude' label.");
              } else {
                throw e;
              }
            }

      - name: Ensure 'upstream-sync' label exists
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # ratchet:actions/github-script@v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'upstream-sync',
              });
              core.info("'upstream-sync' label already exists.");
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'upstream-sync',
                  color: '0075ca',
                  description: 'Tracks changes from the upstream cocoindex-io/cocoindex repository',
                });
                core.info("Created 'upstream-sync' label.");
              } else {
                throw e;
              }
            }

      - name: Determine SINCE_DATE
        id: since-date
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          auth_status="$(gh auth status 2&>/dev/null)"
          echo "$auth_status"
          LAST_ISSUE_DATE="$(gh issue list \
            --repo knitli/recoco \
            --label upstream-sync \
            --state all \
            --limit 1 \
            --json createdAt \
            --jq '.[0].createdAt // empty' 2>/dev/null || true)"

          if [ -z "$LAST_ISSUE_DATE" ]; then
            SINCE_DATE='2026-01-25T00:00:00Z'
            BOOTSTRAPPING='true'
          else
            SINCE_DATE="$(date --utc --iso-8601=seconds --date='14 days ago')"
            BOOTSTRAPPING='false'
          fi

          echo "SINCE_DATE=$SINCE_DATE" >> "$GITHUB_OUTPUT"
          echo "BOOTSTRAPPING=$BOOTSTRAPPING" >> "$GITHUB_OUTPUT"
          echo "Lookback window: SINCE_DATE=$SINCE_DATE (bootstrapping=$BOOTSTRAPPING)"

      - name: Gather Upstream Data
        id: gather-data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINCE_DATE: ${{ steps.since-date.outputs.SINCE_DATE }}
        run: |
          fetch() {
            local label="$1" out="$2"; shift 2
            if "$@" > "$out"; then
              echo "$label: $(jq 'length' "$out")"
            else
              echo "WARNING: $label fetch failed (exit $?), using empty array" >&2
              echo '[]' > "$out"
            fi
          }

          echo "--- Gathering upstream releases ---"
          gh api "repos/cocoindex-io/cocoindex/releases?per_page=20" \
            > /tmp/upstream_releases_raw.json
          jq --arg since "$SINCE_DATE" \
            '[.[] | select(.published_at >= $since) | {tagName: .tag_name, publishedAt: .published_at, name: .name, body: (.body // "" | .[:1500])}]' \
            /tmp/upstream_releases_raw.json > /tmp/upstream_releases.json
          echo "Releases: $(jq 'length' /tmp/upstream_releases.json)"

          echo "--- Gathering upstream commits ---"
          gh api "repos/cocoindex-io/cocoindex/commits?since=${SINCE_DATE}&per_page=100" \
            > /tmp/upstream_commits_raw.json
          jq '[.[] | {sha: (.sha // "" | .[:8]), message: ((.commit.message // "") | split("\n")[0]), date: .commit.author.date, url: (.html_url // "")}]' \
            /tmp/upstream_commits_raw.json > /tmp/upstream_commits.json
          echo "Commits: $(jq 'length' /tmp/upstream_commits.json)"

          echo "--- Gathering upstream version branches ---"
          gh api "repos/cocoindex-io/cocoindex/branches?per_page=100" \
            > /tmp/upstream_branches_raw.json
          jq '[.[] | select(.name | test("^v[1-9]")) | .name]' \
            /tmp/upstream_branches_raw.json > /tmp/upstream_branches.json
          echo "Version branches: $(cat /tmp/upstream_branches.json)"

          echo "--- Gathering upstream merged PRs ---"
          gh api "repos/cocoindex-io/cocoindex/pulls?state=closed&sort=updated&direction=desc&per_page=50" \
            > /tmp/upstream_prs_raw.json
          jq --arg since "$SINCE_DATE" \
            '[.[] | select(.merged_at != null and (.merged_at >= $since)) | {number, title, mergedAt: .merged_at, url: .html_url, body: (.body // "" | .[:1500])}]' \
            /tmp/upstream_prs_raw.json > /tmp/upstream_prs.json
          echo "Merged PRs: $(jq 'length' /tmp/upstream_prs.json)"

          echo "--- Gathering existing tracking issues ---"
          gh issue list \
            --repo knitli/recoco \
            --label upstream-sync \
            --state all \
            --limit 200 \
            --json number,title \
            > /tmp/existing_issues.json || echo '[]' > /tmp/existing_issues.json
          echo "Existing issues: $(jq 'length' /tmp/existing_issues.json)"

      - name: Build Claude Prompt
        env:
          REPO: ${{ github.repository }}
          SINCE_DATE: ${{ steps.since-date.outputs.SINCE_DATE }}
          BOOTSTRAPPING: ${{ steps.since-date.outputs.BOOTSTRAPPING }}
        run: |
          {
            echo 'PROMPT<<UPSTREAM_PROMPT_DELIMITER'
            printf 'REPO: %s\n' "$REPO"
            printf 'SINCE_DATE: %s\n' "$SINCE_DATE"
            printf 'BOOTSTRAPPING: %s\n' "$BOOTSTRAPPING"
            echo ''
            echo '## PRE-FETCHED DATA'
            echo ''
            echo '### Upstream Releases (filtered to >= SINCE_DATE)'
            echo '```json'
            cat /tmp/upstream_releases.json
            echo '```'
            echo ''
            echo '### Upstream Commits (since SINCE_DATE)'
            echo '```json'
            cat /tmp/upstream_commits.json
            echo '```'
            echo ''
            echo '### Version Branches (^v[1-9] only)'
            echo '```json'
            cat /tmp/upstream_branches.json
            echo '```'
            echo ''
            echo '### Merged PRs (merged >= SINCE_DATE)'
            echo '```json'
            cat /tmp/upstream_prs.json
            echo '```'
            echo ''
            echo '### Existing Upstream-Sync Issues in knitli/recoco'
            echo '```json'
            cat /tmp/existing_issues.json
            echo '```'
            echo ''
            echo '---'
            echo ''
            cat "$GITHUB_WORKSPACE/.github/_upstream_agent_prompt.md"
            echo 'UPSTREAM_PROMPT_DELIMITER'
          } >> "$GITHUB_ENV"

      - name: Run Claude Upstream Sync Analysis
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --max-turns 50
            --allowedTools 'Bash,WebFetch'
          prompt: ${{ env.PROMPT }}

      - name: Log Session Output
        run: |
          output_file="/home/runner/work/_temp/claude-execution-output.json"
          if [ -f "$output_file" ]; then
            cat "$output_file"
          else
            echo "No session output file found (Claude Code may have failed to start)"
          fi
